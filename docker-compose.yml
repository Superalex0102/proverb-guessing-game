services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proverb-guessing-game-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_FRONTEND_URL=${NEXT_PUBLIC_FRONTEND_URL}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  upload_data: